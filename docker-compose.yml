services:
  db:
    image: postgres:16
    container_name: db_container
    restart: always
    env_file: ./credentials.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fraud_network

  spark-master:
    image: apache/spark:3.5.3
    container_name: spark_master
    entrypoint: ["/opt/spark/sbin/start-master.sh"]
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - fraud_network

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark_worker
    entrypoint: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_NO_DAEMONIZE=true
    depends_on:
      - spark-master
    networks:
      - fraud_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fraud_network

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka_setup
    depends_on:
      - kafka
    entrypoint: >
      bash -c "
        sleep 10 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic transactions --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic fraud_alerts --partitions 3 --replication-factor 1
      "
    networks:
      - fraud_network

networks:
  fraud_network:
    driver: bridge

volumes:
  postgres_data: